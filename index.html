<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佳佳驾到 | 洛丽塔的梦幻世界</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700&family=ZCOOL+KuaiLe&family=Long+Cang&family=Liu+Jian+Mao+Cao&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --main-pink: #ffdae0;
            --dark-pink: #ff85a2;
            --purple: #e6b3ff;
            --gold: #ffd700;
            --text-color: #5d4a4a;
        }

        body {
            font-family: 'ZCOOL KuaiLe', 'Ma Shan Zheng', 'Noto Sans SC', 'Microsoft YaHei', cursive, sans-serif;
            background: linear-gradient(135deg, #ffd1dc 0%, #ffb3d9 25%, #e6b3ff 50%, #c9b3ff 75%, #ffd1dc 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* 星星背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        header {
            text-align: center;
            padding: 30px 0;
            animation: fadeInDown 1.2s ease;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-family: 'Long Cang', 'ZCOOL KuaiLe', cursive;
            font-weight: bold;
            background: linear-gradient(45deg, #ff85a2, #ffd700, #ff85a2);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbowText 3s ease infinite;
            filter: drop-shadow(2px 2px 0px white) drop-shadow(0 0 20px rgba(255,133,162,0.5));
            margin-bottom: 10px;
        }

        @keyframes rainbowText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .subtitle {
            font-style: italic;
            letter-spacing: 2px;
            animation: float 3s ease-in-out infinite;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* 封面图片 */
        .cover-container {
            text-align: center;
            margin: 20px 0;
            animation: scaleIn 1s ease;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .cover-image {
            width: 100%;
            max-width: 350px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(255,133,162,0.4),
                        0 0 0 8px rgba(255,255,255,0.3),
                        0 0 0 16px rgba(255,182,217,0.2);
            animation: coverPulse 3s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .cover-image:active {
            transform: scale(0.95);
        }

        @keyframes coverPulse {
            0%, 100% {
                box-shadow: 0 15px 40px rgba(255,133,162,0.4),
                            0 0 0 8px rgba(255,255,255,0.3),
                            0 0 0 16px rgba(255,182,217,0.2);
            }
            50% {
                box-shadow: 0 20px 50px rgba(255,133,162,0.6),
                            0 0 0 8px rgba(255,255,255,0.5),
                            0 0 0 16px rgba(255,182,217,0.4);
            }
        }

        /* 音乐播放器 */
        .player-container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 8px 32px rgba(255,133,162,0.3),
                        inset 0 0 20px rgba(255,255,255,0.5);
            margin: 30px 0;
            border: 3px solid rgba(255,255,255,0.6);
            animation: playerGlow 2s ease-in-out infinite;
        }

        @keyframes playerGlow {
            0%, 100% {
                box-shadow: 0 8px 32px rgba(255,133,162,0.3),
                            inset 0 0 20px rgba(255,255,255,0.5);
            }
            50% {
                box-shadow: 0 8px 32px rgba(255,133,162,0.6),
                            inset 0 0 30px rgba(255,255,255,0.7);
            }
        }

        .player-title {
            font-size: clamp(1rem, 4vw, 1.2rem);
            margin-bottom: 15px;
            font-weight: bold;
        }

        audio {
            width: 100%;
            border-radius: 20px;
            outline: none;
        }

        /* 音频可视化 */
        .visualizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 80px;
            gap: 4px;
            margin-top: 20px;
            padding: 0 10px;
        }

        .bar {
            width: 8px;
            min-height: 10px;
            background: linear-gradient(to top, #ff85a2, #ffd700);
            border-radius: 10px;
            animation: wave 1s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(255,133,162,0.5);
        }

        @keyframes wave {
            0%, 100% { height: 20px; }
            50% { height: 60px; }
        }

        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
        .bar:nth-child(5) { animation-delay: 0.4s; }
        .bar:nth-child(6) { animation-delay: 0.3s; }
        .bar:nth-child(7) { animation-delay: 0.2s; }
        .bar:nth-child(8) { animation-delay: 0.1s; }

        /* 歌词区域 */
        .lyrics-container {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 20px;
            margin: 20px 0;
            border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 32px rgba(255,133,162,0.2);
            flex: 1;
            overflow: hidden;
        }

        .lyrics-box {
            height: 300px;
            overflow-y: auto;
            overflow-x: hidden;
            text-align: center;
            line-height: 2.5;
            font-size: clamp(1rem, 4vw, 1.2rem);
            padding: 10px;
            mask-image: linear-gradient(transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(transparent, black 15%, black 85%, transparent);
            scroll-behavior: smooth;
        }

        /* 自定义滚动条 */
        .lyrics-box::-webkit-scrollbar {
            width: 8px;
        }

        .lyrics-box::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .lyrics-box::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #ff85a2, #ffd700);
            border-radius: 10px;
        }

        .lyric-line {
            margin: 20px 0;
            transition: all 0.5s ease;
            opacity: 0.5;
            transform: scale(0.95);
            cursor: pointer;
        }

        .lyric-line:hover {
            opacity: 0.8;
            transform: scale(1);
        }

        .lyric-line.active {
            opacity: 1;
            color: var(--dark-pink);
            font-weight: bold;
            transform: scale(1.1);
            text-shadow: 0 0 10px rgba(255,133,162,0.5);
            animation: lyricPop 0.5s ease;
        }

        @keyframes lyricPop {
            0% { transform: scale(0.95); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1.1); }
        }

        /* 飘落装饰 */
        .floating-deco {
            position: fixed;
            z-index: 999;
            pointer-events: none;
            font-size: 30px;
            animation: fall 5s linear;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 触摸涟漪效果 */
        .ripple {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,133,162,0.6), transparent);
            pointer-events: none;
            animation: rippleEffect 1s ease-out;
            z-index: 9999;
        }

        @keyframes rippleEffect {
            from {
                width: 0;
                height: 0;
                opacity: 1;
            }
            to {
                width: 200px;
                height: 200px;
                opacity: 0;
            }
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            color: rgba(93,74,74,0.6);
        }

        /* 加载提示 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffd1dc 0%, #ffb3d9 25%, #e6b3ff 50%, #c9b3ff 75%, #ffd1dc 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            position: relative;
            margin-bottom: 30px;
        }

        .loading-spinner::before,
        .loading-spinner::after {
            content: '🎀';
            position: absolute;
            font-size: 40px;
            animation: spin 2s linear infinite;
        }

        .loading-spinner::after {
            animation-delay: 1s;
            opacity: 0.5;
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .loading-text {
            font-size: 1.5rem;
            color: var(--dark-pink);
            font-weight: bold;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        .loading-dots {
            display: inline-block;
            width: 60px;
            text-align: left;
        }

        .loading-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* 手机适配 */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            .cover-image {
                max-width: 280px;
            }

            .player-container {
                padding: 20px 15px;
            }

            .lyrics-box {
                height: 250px;
                font-size: 1rem;
            }

            .visualizer {
                height: 60px;
            }

            .bar {
                width: 6px;
            }
        }
    </style>
</head>
<body>
    <!-- 加载提示 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">
            加载中<span class="loading-dots"></span>
        </div>
    </div>

    <!-- 星星背景 -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <header>
            <h1>佳佳驾到 🎀</h1>
            <p class="subtitle">"谁家的小公举迷了路？"</p>
        </header>

        <!-- 封面图片 -->
        <div class="cover-container">
            <img src="cover.jpg" alt="洛丽塔封面" class="cover-image" id="coverImage">
        </div>

        <!-- 音乐播放器 -->
        <div class="player-container">
            <p class="player-title">🎵 正在播放：佳佳爱穿洛丽塔</p>
            <audio id="music-player" controls>
                <source src="your-song.mp3" type="audio/mpeg">
                您的浏览器不支持音频播放。
            </audio>

            <!-- 音频可视化 -->
            <div class="visualizer" id="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>

        <!-- 歌词展示 -->
        <div class="lyrics-container">
            <div class="lyrics-box" id="lyrics-box">
                <p class="lyric-line">加载歌词中...</p>
            </div>
        </div>

        <footer>
            © 2026 佳佳的梦幻次元 | Made with Love & Lace ✨
        </footer>
    </div>

    <script>
        // 等待 DOM 加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // 页面加载完成后隐藏加载提示
            const loadingOverlay = document.getElementById('loadingOverlay');

            // 模拟加载时间，确保资源加载完成
            window.addEventListener('load', () => {
                setTimeout(() => {
                    loadingOverlay.classList.add('hidden');
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                    }, 500);
                }, 800);
            });

            // 获取元素
            const lyricsBox = document.getElementById('lyrics-box');
            const audio = document.getElementById('music-player');
            const visualizer = document.getElementById('visualizer');
            const bars = visualizer.querySelectorAll('.bar');
            const coverImage = document.getElementById('coverImage');

            // ========== 在这里粘贴你的 LRC 歌词 ==========
            const lrcContent = `[00:00.00]Check check…
[00:03.67]谁家的小公举迷了路？(hey)
[00:06.07]蕾丝边，蝴蝶结，别眨眼
[00:07.97]佳佳驾到，全场尖叫，Yo！
[00:10.69]她推开大门 像是掉进爱丽丝的洞
[00:13.56]满屋的蓬蓬裙 简直是她的美梦
[00:16.36]每一件小裙 都有个诗意的名
[00:18.99]为了抢个限量 说戒零食也行
[00:22.82]穿上撑裙 走路像个不倒翁
[00:25.29]左边摇 右边晃 自己乐得起风
[00:28.09]脑回路 偶尔短线 跑偏方向
[00:30.64]可一套好坐标 就在那衣柜中央
[00:34.15]她给娃娃试衣 量身配对颜色
[00:36.78]口袋里塞着夹子 准备随时改折
[00:39.65]有人说她怪 她只当听到夸奖
[00:42.29]因为穿上洛丽塔 她就是今天主场 (woah)
[00:46.68]佳佳爱穿洛丽塔 像朵盛开的花
[00:48.59]就算跌跌撞撞 也要优雅地回家
[00:52.10]佳佳就是个小傻 萌得不像话
[00:53.94]在这个疯狂世界 保持最真的童话
[00:56.41]佳佳爱穿洛丽塔 心事缝进蕾花
[00:59.92]口袋塞着小糖 也是给明天的答
[01:03.43]佳佳就是个小傻 笑点低得可怕
[01:05.43]可她一转个身啊 整条街都柔化
[01:08.06]她说那是优雅 克制 还有那份精致
[01:10.69]我看她发呆时 动作确实有点迟
[01:13.48]手里的蕾丝洋伞 不是为了遮阳
[01:16.52]只是合影举个手 做个帅气登场
[01:19.15]你笑她傻吗 也许是太认真
[01:21.70]把每一条花边 都当信仰来拯救早晨
[01:24.89]活在自己的次元 谁也别想代替
[01:27.69]她用缎带写日记 记今天又多勇气
[01:30.64]哪怕袜带系反 蝴蝶结歪一旁
[01:33.51]自拍照传上去 仍然一排夸奖
[01:36.46]她还是那个佳佳 眼睛亮得固执
[01:39.10]在灰色的地铁里 发出粉色的标志 (oh yeah)
[01:42.61]不管别人怎么看 风格由她决定
[01:45.64]洛丽塔的裙摆 藏着少女的心境
[01:47.87]傻得可爱 傻得坦率 像刚拆封的光
[01:50.35]每一层薄纱底下 都有不服输的倔强
[01:53.86]佳佳爱穿洛丽塔 像朵盛开的花
[01:56.33]就算跌跌撞撞 也要优雅地回家
[02:00.00]佳佳就是个小傻 萌得不像话
[02:01.75]在这个疯狂世界 保持最真的童话
[02:05.58]佳佳爱穿洛丽塔 转一圈就开挂
[02:07.66]人群再吵再乱 她自成一幅画
[02:10.05]佳佳就是个小傻 我却说她伟大
[02:13.00]因为她敢当自己 这就是最甜的回答`;
            // ========== 歌词粘贴区域结束 ==========

            // 解析 LRC 格式
            function parseLRC(lrcText) {
                const lines = lrcText.split('\n');
                const lyrics = [];
                lines.forEach(line => {
                    const match = line.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/);
                    if (match) {
                        const minutes = parseInt(match[1]);
                        const seconds = parseFloat(match[2]);
                        const time = minutes * 60 + seconds;
                        const text = match[3].trim();
                        if (text) {
                            lyrics.push({ time, text });
                        }
                    }
                });
                return lyrics.sort((a, b) => a.time - b.time);
            }

            // 显示歌词
            function displayLyrics(lyricsData) {
                lyricsBox.innerHTML = '';
                lyricsData.forEach((lyric, index) => {
                    const p = document.createElement('p');
                    p.className = 'lyric-line';
                    p.textContent = lyric.text;
                    p.dataset.index = index;
                    p.dataset.time = lyric.time;
                    lyricsBox.appendChild(p);
                });
            }

            // 初始化歌词
            const lyricsData = parseLRC(lrcContent);
            displayLyrics(lyricsData);

            // 创建星星背景
            function createStars() {
                const starsContainer = document.getElementById('stars');
                for (let i = 0; i < 50; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.width = Math.random() * 3 + 2 + 'px';
                    star.style.height = star.style.width;
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDelay = Math.random() * 3 + 's';
                    starsContainer.appendChild(star);
                }
            }
            createStars();

            // 飘落装饰（蝴蝶结、爱心、星星）
            const decoEmojis = ['🎀', '💖', '✨', '🌸', '👑', '🦋', '💝', '🌟'];
            function createFloatingDeco() {
                const deco = document.createElement('div');
                deco.className = 'floating-deco';
                deco.textContent = decoEmojis[Math.floor(Math.random() * decoEmojis.length)];
                deco.style.left = Math.random() * 100 + 'vw';
                deco.style.top = '-50px';
                document.body.appendChild(deco);

                setTimeout(() => deco.remove(), 5000);
            }
            setInterval(createFloatingDeco, 1500);

            // 触摸/点击涟漪效果
            function createRipple(e) {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                ripple.style.left = (e.clientX || e.touches[0].clientX) - 100 + 'px';
                ripple.style.top = (e.clientY || e.touches[0].clientY) - 100 + 'px';
                document.body.appendChild(ripple);

                setTimeout(() => ripple.remove(), 1000);
            }
            document.addEventListener('click', createRipple);
            document.addEventListener('touchstart', createRipple);

            // 音频播放时的动画效果
            audio.addEventListener('play', () => {
                bars.forEach(bar => {
                    bar.style.animationPlayState = 'running';
                });
                coverImage.style.animation = 'coverPulse 3s ease-in-out infinite, spin 20s linear infinite';
            });

            audio.addEventListener('pause', () => {
                bars.forEach(bar => {
                    bar.style.animationPlayState = 'paused';
                });
                coverImage.style.animation = 'coverPulse 3s ease-in-out infinite';
            });

            // 旋转动画
            const style = document.createElement('style');
            style.textContent = `
                @keyframes spin {
                    from { transform: rotate(0deg); }
                    to { transform: rotate(360deg); }
                }
            `;
            document.head.appendChild(style);

            // 歌词同步
            let currentLyricIndex = -1;

            audio.addEventListener('timeupdate', () => {
                const currentTime = audio.currentTime;

                // 找到当前应该显示的歌词
                for (let i = lyricsData.length - 1; i >= 0; i--) {
                    if (currentTime >= lyricsData[i].time) {
                        if (i !== currentLyricIndex) {
                            currentLyricIndex = i;
                            updateLyricDisplay(i);
                        }
                        break;
                    }
                }
            });

            function updateLyricDisplay(index) {
                const lyricLines = lyricsBox.querySelectorAll('.lyric-line');
                lyricLines.forEach(line => line.classList.remove('active'));

                if (lyricLines[index]) {
                    lyricLines[index].classList.add('active');
                    lyricLines[index].scrollIntoView({
                        behavior: 'smooth',
                        block: 'center'
                    });
                }
            }

            // 点击歌词跳转到对应时间
            lyricsBox.addEventListener('click', (e) => {
                if (e.target.classList.contains('lyric-line')) {
                    const time = parseFloat(e.target.dataset.time);
                    if (!isNaN(time)) {
                        audio.currentTime = time;
                    }
                }
            });

            // 滑动特效 - 下拉刷新效果
            let startY = 0;
            let isPulling = false;

            lyricsBox.addEventListener('touchstart', (e) => {
                if (lyricsBox.scrollTop === 0) {
                    startY = e.touches[0].clientY;
                    isPulling = true;
                }
            });

            lyricsBox.addEventListener('touchmove', (e) => {
                if (isPulling) {
                    const currentY = e.touches[0].clientY;
                    const diff = currentY - startY;
                    if (diff > 0 && diff < 100) {
                        lyricsBox.style.transform = `translateY(${diff * 0.5}px)`;
                        lyricsBox.style.opacity = 1 - (diff / 200);
                    }
                }
            });

            lyricsBox.addEventListener('touchend', () => {
                if (isPulling) {
                    lyricsBox.style.transform = 'translateY(0)';
                    lyricsBox.style.opacity = '1';
                    lyricsBox.style.transition = 'all 0.3s ease';
                    setTimeout(() => {
                        lyricsBox.style.transition = '';
                    }, 300);
                    isPulling = false;
                }
            });

            // 页面下滑自动播放（改进版，兼容 Safari）
            let hasAutoPlayed = false;
            let scrollStartY = 0;
            let scrollDiff = 0;

            window.addEventListener('touchstart', (e) => {
                scrollStartY = e.touches[0].clientY;
            });

            window.addEventListener('touchmove', (e) => {
                if (!hasAutoPlayed && audio.paused) {
                    const scrollCurrentY = e.touches[0].clientY;
                    scrollDiff = scrollStartY - scrollCurrentY;
                }
            });

            // 使用 touchend 触发播放，Safari 更容易接受
            window.addEventListener('touchend', () => {
                if (!hasAutoPlayed && audio.paused && scrollDiff > 50) {
                    audio.play().then(() => {
                        hasAutoPlayed = true;
                        showPlayTip();
                    }).catch(err => {
                        console.log('自动播放被阻止:', err);
                        // Safari 阻止时显示提示
                        showClickToPlayTip();
                    });
                }
                scrollDiff = 0;
            });

            // 显示播放提示
            function showPlayTip() {
                const tip = document.createElement('div');
                tip.textContent = '🎵 音乐已开始播放';
                tip.style.position = 'fixed';
                tip.style.top = '50%';
                tip.style.left = '50%';
                tip.style.transform = 'translate(-50%, -50%)';
                tip.style.background = 'rgba(255, 133, 162, 0.9)';
                tip.style.color = 'white';
                tip.style.padding = '15px 30px';
                tip.style.borderRadius = '30px';
                tip.style.fontSize = '16px';
                tip.style.fontWeight = 'bold';
                tip.style.zIndex = '99999';
                tip.style.boxShadow = '0 8px 32px rgba(255, 133, 162, 0.5)';
                tip.style.animation = 'fadeInOut 2s ease';
                document.body.appendChild(tip);

                // 添加淡入淡出动画
                const tipStyle = document.createElement('style');
                tipStyle.textContent = `
                    @keyframes fadeInOut {
                        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
                        20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                        80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                        100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
                    }
                `;
                document.head.appendChild(tipStyle);

                setTimeout(() => tip.remove(), 2000);
            }

            // 显示点击播放提示（Safari 阻止时）
            function showClickToPlayTip() {
                const tip = document.createElement('div');
                tip.textContent = '👆 点击封面或播放按钮开始播放';
                tip.style.position = 'fixed';
                tip.style.top = '50%';
                tip.style.left = '50%';
                tip.style.transform = 'translate(-50%, -50%)';
                tip.style.background = 'rgba(255, 133, 162, 0.95)';
                tip.style.color = 'white';
                tip.style.padding = '15px 30px';
                tip.style.borderRadius = '30px';
                tip.style.fontSize = '16px';
                tip.style.fontWeight = 'bold';
                tip.style.zIndex = '99999';
                tip.style.boxShadow = '0 8px 32px rgba(255, 133, 162, 0.5)';
                tip.style.animation = 'fadeInOut 3s ease';
                tip.style.textAlign = 'center';
                tip.style.maxWidth = '80%';
                document.body.appendChild(tip);

                setTimeout(() => tip.remove(), 3000);
            }

            // 点击封面播放/暂停 + 爱心特效
            coverImage.addEventListener('click', () => {
                // 播放/暂停音乐
                if (audio.paused) {
                    audio.play().then(() => {
                        hasAutoPlayed = true;
                    });
                } else {
                    audio.pause();
                }

                // 创建爱心爆炸效果
                for (let i = 0; i < 8; i++) {
                    const heart = document.createElement('div');
                    heart.textContent = '💖';
                    heart.style.position = 'fixed';
                    heart.style.left = coverImage.getBoundingClientRect().left + coverImage.offsetWidth / 2 + 'px';
                    heart.style.top = coverImage.getBoundingClientRect().top + coverImage.offsetHeight / 2 + 'px';
                    heart.style.fontSize = '30px';
                    heart.style.pointerEvents = 'none';
                    heart.style.zIndex = '9999';

                    const angle = (i / 8) * Math.PI * 2;
                    const distance = 100;
                    const tx = Math.cos(angle) * distance;
                    const ty = Math.sin(angle) * distance;

                    heart.style.transition = 'all 1s ease-out';
                    document.body.appendChild(heart);

                    setTimeout(() => {
                        heart.style.transform = `translate(${tx}px, ${ty}px)`;
                        heart.style.opacity = '0';
                    }, 10);

                    setTimeout(() => heart.remove(), 1000);
                }
            });
        });
    </script>
</body>
</html>
